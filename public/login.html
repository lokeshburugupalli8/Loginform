<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Login</h1>
      <div id="errorMsg" class="error"></div>
      <form id="loginForm" method="post" action="/login">
        <label>Email</label>
        <input type="email" id="email" name="email" required />
        <label>Password</label>
        <input type="password" id="password" name="password" required />
        <button type="submit">Login</button>
      </form>
      <p class="tiny">New user? <a href="/register">Register here</a>.</p>
      <script>
        const query = new URLSearchParams(window.location.search);
        const serverError = query.get('error');
        const serverSuccess = query.get('success');
        const errorDiv = document.getElementById('errorMsg');
        if (serverError) { errorDiv.textContent = serverError; }
        if (serverSuccess) { errorDiv.style.color = '#16a34a'; errorDiv.textContent = serverSuccess; }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
          const email = document.getElementById('email').value.trim();
          const pass = document.getElementById('password').value;
          const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          let msg = '';
          if (!emailRe.test(email) || !email.includes('.')) msg = 'Please enter a valid email.';
          else if (!pass) msg = 'Password is required.';
          if (msg) { e.preventDefault(); errorDiv.style.color = '#dc2626'; errorDiv.textContent = msg; }
        });
      </script>
    </div>
  </div>
</body>
</html>
